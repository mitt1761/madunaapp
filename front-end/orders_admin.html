<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pesanan - Maduna</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="admin_global.css">
    <link rel="stylesheet" href="orders_admin.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-body">

<div class="container-fluid p-0 d-flex min-vh-100 fade-in-up">

    <!-- SIDEBAR (Offcanvas on Mobile, Persistent on Desktop) -->
    <aside class="sidebar offcanvas-lg offcanvas-start bg-primary text-white p-4 d-flex flex-column" tabindex="-1" id="sidebarMenu" style="width: 280px; transition: 0.3s;">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div class="logo">
                <h2 class="fw-bold mb-1">🍯 Maduna</h2>
                <span class="opacity-75 small">Admin Panel</span>
            </div>
            <button type="button" class="btn-close btn-close-white d-lg-none" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Close"></button>
        </div>
        <ul class="nav nav-pills flex-column mb-auto menu list-unstyled gap-2">
            <li class="nav-item">
                <a href="dashboard_admin.html" class="nav-link text-white menu-link d-flex align-items-center rounded-3 px-3 py-2">
                    <i class="bi bi-grid-fill me-3 fs-5"></i>
                    <span class="fw-medium">Dashboard</span>
                </a>
            </li>
            <li class="nav-item active">
                <a href="orders_admin.html" class="nav-link text-white menu-link d-flex align-items-center rounded-3 px-3 py-2">
                    <i class="bi bi-cart-fill me-3 fs-5"></i>
                    <span class="fw-medium">Pesanan</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="users_admin.html" class="nav-link text-white menu-link d-flex align-items-center rounded-3 px-3 py-2">
                    <i class="bi bi-people-fill me-3 fs-5"></i>
                    <span class="fw-medium">Pengguna</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="products_admin.html" class="nav-link text-white menu-link d-flex align-items-center rounded-3 px-3 py-2">
                    <i class="bi bi-box-seam-fill me-3 fs-5"></i>
                    <span class="fw-medium">Stok Produk</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="comments_admin.html" class="nav-link text-white menu-link d-flex align-items-center rounded-3 px-3 py-2">
                    <i class="bi bi-chat-left-text-fill me-3 fs-5"></i>
                    <span class="fw-medium">Komentar</span>
                </a>
            </li>
            <li class="nav-item mt-auto" id="logoutBtn" style="cursor:pointer;">
                <div class="nav-link text-white d-flex align-items-center rounded-3 px-3 py-2 opacity-75 hover-opacity-100">
                    <i class="bi bi-box-arrow-right me-3 fs-5"></i>
                    <span class="fw-medium">Logout</span>
                </div>
            </li>
        </ul>
    </aside>

    <!-- CONTENT -->
    <main class="content flex-grow-1 p-4 px-md-5 bg-body" style="min-width: 0;">

    <!-- HEADER SECTION -->
    <header class="topbar glass-header d-flex justify-content-between align-items-center mb-5 flex-wrap gap-3">
        <div class="d-flex align-items-center gap-3">
            <button id="menuToggle" class="btn btn-outline-primary d-lg-none border-0 fs-4 px-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                <i class="bi bi-list"></i>
            </button>
            <div>
                <h1 class="h3 fw-bold text-primary mb-1">Kelola Pesanan</h1>
                <p class="text-muted mb-0 fw-medium">Manajemen pesanan pelanggan Maduna</p>
            </div>
        </div>

        <div class="header-actions d-flex gap-2">
            <button id="refreshBtn" class="btn btn-primary d-flex align-items-center gap-2 shadow-sm rounded-3 px-3">
                <i class="bi bi-arrow-clockwise"></i>
                <span class="fw-medium">Refresh</span>
            </button>
            <a href="dashboard_admin.html" class="text-decoration-none">
                <button class="btn btn-outline-primary d-flex align-items-center gap-2 shadow-sm rounded-3 px-3">
                    <i class="bi bi-grid-fill"></i>
                    <span class="fw-medium">Dashboard</span>
                </button>
            </a>
        </div>
    </header>

    <!-- MAIN CARD -->
    <section class="card border-0 shadow-sm rounded-4 flex-grow-1 d-flex flex-column overflow-hidden">
        
        <!-- TOOLBAR: SEARCH & FILTER -->
        <div class="card-header bg-white border-bottom border-light p-4 d-flex flex-column flex-md-row justify-content-between gap-3 align-items-center">
            <div class="d-flex align-items-center w-100" style="max-width: 400px;">
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted px-3"><i class="bi bi-search"></i></span>
                    <input type="text" id="searchInput" class="form-control bg-light border-start-0 ps-0" placeholder="Cari ID pesanan atau pelanggan...">
                </div>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span class="text-muted fw-semibold small">Filter:</span>
                <select class="form-select form-select-sm border-light shadow-sm fw-medium px-3 py-2 rounded-3" style="width: auto;">
                    <option value="">Semua Status</option>
                    <option value="pending">Pending</option>
                    <option value="dikirim">Dikirim</option>
                    <option value="selesai">Selesai</option>
                    <option value="dibatalkan">Dibatalkan</option>
                </select>
            </div>
        </div>

        <!-- TABLE SECTION -->
        <div class="card-body p-0 d-flex flex-column">
            <div class="table-responsive flex-grow-1 custom-scroll" style="max-height: 60vh;">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light sticky-top">
                        <tr>
                            <th class="border-0 px-4 py-3 fw-semibold text-dark">ID</th>
                            <th class="border-0 py-3 fw-semibold text-dark">Pelanggan</th>
                            <th class="border-0 py-3 fw-semibold text-dark">Qty</th>
                            <th class="border-0 py-3 fw-semibold text-dark">Total</th>
                            <th class="border-0 py-3 fw-semibold text-dark">Status</th>
                            <th class="border-0 py-3 fw-semibold text-dark">Tanggal</th>
                            <th class="border-0 px-4 py-3 fw-semibold text-dark text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable" class="border-top-0">
                        <!-- Data dimuat dari JS -->
                        <tr class="skeleton-row"><td colspan="7" class="py-4"><div class="placeholder-glow"><span class="placeholder col-12"></span></div></td></tr>
                        <tr class="skeleton-row"><td colspan="7" class="py-4"><div class="placeholder-glow"><span class="placeholder col-12"></span></div></td></tr>
                        <tr class="skeleton-row"><td colspan="7" class="py-4"><div class="placeholder-glow"><span class="placeholder col-12"></span></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- PAGINATION PLACEHOLDER -->
        <div class="card-footer bg-white border-top border-light p-3 d-flex justify-content-between align-items-center">
            <span class="text-muted small fw-medium">Menampilkan 1-10 dari 50 pesanan</span>
            <nav aria-label="Page navigation">
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item disabled">
                        <a class="page-link px-3 rounded-start-3" href="#" tabindex="-1"><i class="bi bi-chevron-left"></i></a>
                    </li>
                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                    <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">3</a></li>
                    <li class="page-item">
                        <a class="page-link px-3 rounded-end-3" href="#"><i class="bi bi-chevron-right"></i></a>
                    </li>
                </ul>
            </nav>
        </div>

    </section>
    </main>
</div>

<!-- Modal -->
<div class="modal-custom" id="statusModal">
    <div class="modal-content-custom card border-0 shadow rounded-4 p-4">
        <h5 class="fw-bold text-primary mb-4">Update Status Pesanan</h5>

        <input type="hidden" id="orderId">

        <select id="statusSelect" class="form-select mb-4 fw-medium shadow-sm border-light">
            <option value="pending">Pending</option>
            <option value="dikirim">Dikirim</option>
            <option value="selesai">Selesai</option>
            <option value="dibatalkan">Dibatalkan</option>
        </select>

        <div class="modal-buttons d-flex gap-2 justify-content-end">
            <button id="closeModalBtn" class="btn btn-outline-secondary px-4 fw-medium rounded-3">Batal</button>
            <button id="saveStatusBtn" class="btn btn-primary px-4 fw-medium rounded-3">Simpan</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="ux.js"></script>
<script src="auth.js"></script>
<script src="orders_admin.js"></script>

</body>
</html>
