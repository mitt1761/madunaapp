<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Lupa Password - Maduna</title>

<link rel="stylesheet"
href="forgot_password.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Lupa Password</h1>

        <p>
        Masukkan email akun Anda.
        Link reset password akan dikirim ke email tersebut.
        </p>

        <input
        type="email"
        id="email"
        placeholder="Masukkan Email">

        <button
        id="sendBtn">

        Kirim Link Reset

        </button>

        <a
        href="login.html">

        Kembali ke Login

        </a>

    </div>

</div>

<script src="forgot_password.js"></script>

</body>
</html>
