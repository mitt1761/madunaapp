<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Reset Password - Maduna</title>

    <link
        rel="stylesheet"
        href="reset_password.css">

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>Reset Password</h1>

            <p>
                Masukkan password baru Anda.
            </p>

            <input
                type="password"
                id="password"
                placeholder="Password Baru">

            <input
                type="password"
                id="confirmPassword"
                placeholder="Konfirmasi Password">

            <button id="resetBtn">

                Simpan Password

            </button>

        </div>

    </div>

<script src="reset_password.js"></script>

</body>
</html>
